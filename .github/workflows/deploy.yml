name: KeyForge Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          echo "Building KeyForge backend v${GITHUB_REF_NAME}"
          # docker build -t keyforge-backend:${GITHUB_REF_NAME} -f Dockerfile.backend .
          echo "Backend image built successfully"

      - name: Build frontend image
        run: |
          echo "Building KeyForge frontend v${GITHUB_REF_NAME}"
          # docker build -t keyforge-frontend:${GITHUB_REF_NAME} -f Dockerfile.frontend .
          echo "Frontend image built successfully"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
