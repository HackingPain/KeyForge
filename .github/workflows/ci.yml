name: KeyForge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install flake8 black isort mypy
      - run: black --check backend/
      - run: isort --check-only backend/
      - run: flake8 backend/ --max-line-length=120 --ignore=E501,W503,E203

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: keyforge_test
          ENCRYPTION_KEY: dGVzdGtleWZvcmtleWZvcmdlMTIzNDU2Nzg5MDEyMzQ1Ng==
          JWT_SECRET: test-jwt-secret
        run: pytest tests/ -v --cov=backend --cov-report=term-missing --cov-report=xml
      # Coverage floor. The current line coverage as measured locally with the
      # full backend test suite is 57% (5619 statements, 2436 missed). The floor
      # is set to 55% (current rounded down to the nearest 5%) so that this gate
      # only catches regressions and does not force coverage upward. Raise this
      # number deliberately as part of a quality push, not as a side effect of a
      # feature PR. Relies on the .coverage data file produced by the previous
      # pytest --cov=backend step.
      - name: Enforce coverage floor
        run: python -m coverage report --fail-under=55
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        if: always()

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx jest --watchAll=false --passWithNoTests
        env:
          NODE_ENV: test

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx eslint src/ --max-warnings=0

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install safety bandit
      - run: safety check -r requirements.txt || true
      - run: bandit -r backend/ -ll --skip B101 || true

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: Install backend deps
        run: pip install -r requirements.txt
      - name: Install e2e deps
        working-directory: e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Install frontend static server
        run: npm install -g serve
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Start backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: keyforge_test
          ENCRYPTION_KEY: dGVzdGtleWZvcmtleWZvcmdlMTIzNDU2Nzg5MDEyMzQ1Ng==
          JWT_SECRET: test-jwt-secret
          KEYFORGE_COOKIE_SECURE: 'false'
        run: |
          nohup uvicorn backend.server:app --host 0.0.0.0 --port 8001 > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend failed to become healthy in 60s"
          cat backend.log
          exit 1
      - name: Start frontend
        working-directory: frontend/build
        run: |
          nohup serve -s . -l 3000 > ../../frontend.log 2>&1 &
          echo $! > ../../frontend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/ > /dev/null 2>&1; then
              echo "frontend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "frontend failed to become healthy in 60s"
          cat ../../frontend.log
          exit 1
      - name: Run Playwright tests
        working-directory: e2e
        env:
          CI: 'true'
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: Stop backend and frontend
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" || true; fi
          if [ -f frontend.pid ]; then kill "$(cat frontend.pid)" || true; fi

  docker-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: dGVzdGtleWZvcmtleWZvcmdlMTIzNDU2Nzg5MDEyMzQ1Ng==
      JWT_SECRET: test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - name: Build and start the stack
        run: docker compose up -d --build
      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy in 60s; dumping compose logs"
          docker compose logs
          exit 1
      - name: Tear down the stack
        if: always()
        run: docker compose down -v
