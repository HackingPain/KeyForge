# Example 1 - Sync a single credential into a Secret
apiVersion: keyforge.io/v1alpha1
kind: KeyForgeSecret
metadata:
  name: my-api-key
  namespace: default
spec:
  credentialIds:
    - "cred-abc-123"
  secretName: my-api-key-secret

---
# Example 2 - Sync multiple credentials into one Secret with key mapping
apiVersion: keyforge.io/v1alpha1
kind: KeyForgeSecret
metadata:
  name: multi-cred-bundle
  namespace: default
spec:
  credentialIds:
    - "cred-abc-123"
    - "cred-def-456"
    - "cred-ghi-789"
  secretName: app-credentials
  namespace: production
  refreshInterval: 120
  keyMapping:
    cred-abc-123: STRIPE_API_KEY
    cred-def-456: AWS_SECRET_KEY
    cred-ghi-789: DATABASE_PASSWORD
