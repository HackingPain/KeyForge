services:
  mongodb:
    image: mongo:7
    # Do not expose MongoDB to the host in production; only backend needs access.
    # Uncomment the ports mapping below for local development only.
    # ports:
    #   - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    # backend/.env is the source of truth for local dev (ENCRYPTION_KEY,
    # JWT_SECRET, GITHUB_APP_*, KEYFORGE_*, and any future credential-issuer
    # vars). It is gitignored, so mark it required:false so CI (which gets
    # ENCRYPTION_KEY + JWT_SECRET from job-level env via the ${VAR}
    # interpolations below) can still bring up the stack without it.
    env_file:
      - path: backend/.env
        required: false
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=keyforge
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
