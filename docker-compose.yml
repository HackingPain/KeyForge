services:
  mongodb:
    image: mongo:7
    # Do not expose MongoDB to the host in production; only backend needs access.
    # Uncomment the ports mapping below for local development only.
    # ports:
    #   - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    # backend/.env is the single source of truth for ENCRYPTION_KEY,
    # JWT_SECRET, GITHUB_APP_*, KEYFORGE_*, and every other backend env var.
    # It is gitignored; CI's docker-smoke job writes a stub before bringing
    # the stack up. The explicit `environment:` block below carries only the
    # values that must differ between bare-metal and the compose network
    # (Mongo URL points at the mongodb service).
    #
    # Important: `environment:` in compose overrides `env_file`. We
    # deliberately do NOT list ENCRYPTION_KEY / JWT_SECRET here, so the
    # values from env_file flow through to the container intact.
    env_file:
      - path: backend/.env
        required: false
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=keyforge
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
